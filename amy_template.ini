[custom]

; ==============================
; 基础设置
; ==============================
enable_rule_generator=true
overwrite_original_rules=true

; ==============================
; Clash 通用设置
; ==============================
clash_rule_base=https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GeneralClashConfig.yml

; ==============================
; 代理组定义
; custom_proxy_group 格式：
; 组名`类型`[图标]`节点筛选正则`[测速URL]`[间隔]`[节点/子组...]
; ==============================

; --- 主选择组 ---
custom_proxy_group=Proxies`select`[]`.*`
custom_proxy_group=🎯Direct`select`[]`DIRECT`
custom_proxy_group=✈️Final`select`[]`.*`,,🎯Direct

; --- 流媒体 ---
custom_proxy_group=Netflix`select`[]`.*`,,Proxies,,🎯Direct
custom_proxy_group=HBO`select`[]`.*`,,Proxies,,🎯Direct
custom_proxy_group=DisneyPlus`select`[]`.*`,,Proxies,,🎯Direct
custom_proxy_group=YouTube`select`[]`.*`,,Proxies,,🎯Direct
custom_proxy_group=Bahamut`select`[]`.*`,,Proxies,,🎯Direct
custom_proxy_group=Bilibili`select`[]`DIRECT`,,Proxies
custom_proxy_group=MyTVSuper`select`[]`.*`,,Proxies,,🎯Direct

; --- AI 工具 ---
custom_proxy_group=AI`select`[]`.*`,,Proxies,,🎯Direct

; --- 社交/即时通讯 ---
custom_proxy_group=Telegram`select`[]`.*`,,Proxies,,🎯Direct
custom_proxy_group=Tiktok`select`[]`.*`,,Proxies,,🎯Direct

; --- 加密货币 ---
custom_proxy_group=Crypto`select`[]`.*`,,Proxies,,🎯Direct

; --- 游戏平台 ---
custom_proxy_group=Steam`select`[]`.*`,,Proxies,,🎯Direct
custom_proxy_group=Epic`select`[]`.*`,,Proxies,,🎯Direct
custom_proxy_group=Xbox`select`[]`.*`,,Proxies,,🎯Direct
custom_proxy_group=PlayStation`select`[]`.*`,,Proxies,,🎯Direct

; --- 大厂直连 ---
custom_proxy_group=Microsoft`select`[]`DIRECT`,,Proxies
custom_proxy_group=Apple`select`[]`DIRECT`,,Proxies
custom_proxy_group=Google`select`[]`.*`,,Proxies,,🎯Direct

; --- 学术 ---
custom_proxy_group=Scholar`select`[]`.*`,,Proxies,,🎯Direct

; ==============================
; 节点地区分组（urltest 自动选优）
; ==============================
custom_proxy_group=🇭🇰 香港`url-test`[]`(?i)港|HK|Hong Kong`http://www.gstatic.com/generate_204`300
custom_proxy_group=🇺🇸 美国`url-test`[]`(?i)美|US|United States`http://www.gstatic.com/generate_204`300
custom_proxy_group=🇯🇵 日本`url-test`[]`(?i)日|JP|Japan`http://www.gstatic.com/generate_204`300
custom_proxy_group=🇨🇳 台湾`url-test`[]`(?i)台|TW|Taiwan`http://www.gstatic.com/generate_204`300
custom_proxy_group=🇸🇬 新加坡`url-test`[]`(?i)新|SG|Singapore`http://www.gstatic.com/generate_204`300

; ==============================
; 规则集（ruleset）
; 格式：代理组名,规则来源URL  或  代理组名,[]RULE-TYPE,value
; ==============================

; -- 本地/内网直连 --
ruleset=🎯Direct,[]DOMAIN-SUFFIX,localhost
ruleset=🎯Direct,[]DOMAIN-SUFFIX,local
ruleset=🎯Direct,[]IP-CIDR,192.168.0.0/16
ruleset=🎯Direct,[]IP-CIDR,10.0.0.0/8
ruleset=🎯Direct,[]IP-CIDR,172.16.0.0/12
ruleset=🎯Direct,[]IP-CIDR,127.0.0.0/8

; -- DNS（subconverter 本身需要放行）--
ruleset=🎯Direct,[]DOMAIN-SUFFIX,ping0.cc
ruleset=🎯Direct,[]DOMAIN-SUFFIX,durable0762.com
ruleset=🎯Direct,[]DOMAIN-SUFFIX,wrecking7857.com
ruleset=🎯Direct,[]DOMAIN-SUFFIX,carrousel6917.com
ruleset=🎯Direct,[]DOMAIN-SUFFIX,simmering3378.com

; -- 微信直连 --
ruleset=🎯Direct,[]PROCESS-NAME,Weixin.exe

; -- AI --
ruleset=AI,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.list
ruleset=AI,[]DOMAIN-SUFFIX,anthropic.com
ruleset=AI,[]DOMAIN-SUFFIX,claude.ai
ruleset=AI,[]DOMAIN-SUFFIX,perplexity.ai
ruleset=AI,[]DOMAIN-SUFFIX,pplx.ai
ruleset=AI,[]DOMAIN-SUFFIX,x.ai
ruleset=AI,[]DOMAIN-SUFFIX,grok.com

; -- Scholar --
ruleset=Scholar,[]DOMAIN,scholar.google.com
ruleset=Scholar,[]DOMAIN-SUFFIX,arxiv.org
ruleset=Scholar,[]DOMAIN-SUFFIX,sci-hub.tw
ruleset=Scholar,[]DOMAIN-SUFFIX,semanticscholar.org
ruleset=Scholar,[]DOMAIN-SUFFIX,researchgate.net
ruleset=Scholar,[]DOMAIN-SUFFIX,springer.com
ruleset=Scholar,[]DOMAIN-SUFFIX,elsevier.com
ruleset=Scholar,[]DOMAIN-SUFFIX,ieee.org
ruleset=Scholar,[]DOMAIN-SUFFIX,nature.com
ruleset=Scholar,[]DOMAIN-SUFFIX,sciencedirect.com
ruleset=Scholar,[]DOMAIN-SUFFIX,jstor.org
ruleset=Scholar,[]DOMAIN-SUFFIX,wiley.com

; -- MyTVSuper --
ruleset=MyTVSuper,[]DOMAIN-SUFFIX,mytvsuper.com
ruleset=MyTVSuper,[]DOMAIN-SUFFIX,tvb.com

; -- Crypto --
ruleset=Crypto,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Cryptocurrency/Cryptocurrency.list
ruleset=Crypto,[]DOMAIN-SUFFIX,binance.com
ruleset=Crypto,[]DOMAIN-SUFFIX,okx.com
ruleset=Crypto,[]DOMAIN-SUFFIX,bybit.com
ruleset=Crypto,[]DOMAIN-SUFFIX,coinbase.com
ruleset=Crypto,[]DOMAIN-SUFFIX,coingecko.com

; -- Netflix --
ruleset=Netflix,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Netflix/Netflix.list

; -- HBO --
ruleset=HBO,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/HBO/HBO.list
ruleset=HBO,[]DOMAIN-SUFFIX,max.com
ruleset=HBO,[]DOMAIN-SUFFIX,hbomax.com

; -- Disney+ --
ruleset=DisneyPlus,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Disney/Disney.list
ruleset=DisneyPlus,[]DOMAIN-SUFFIX,disneyplus.com

; -- Bahamut --
ruleset=Bahamut,[]DOMAIN-SUFFIX,bahamut.com.tw
ruleset=Bahamut,[]DOMAIN-SUFFIX,gamer.com.tw

; -- Bilibili --
ruleset=Bilibili,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/BiliBili/BiliBili.list

; -- YouTube --
ruleset=YouTube,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/YouTube/YouTube.list

; -- Tiktok --
ruleset=Tiktok,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/TikTok/TikTok.list

; -- Telegram --
ruleset=Telegram,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.list

; -- Steam --
ruleset=Steam,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Steam/Steam.list

; -- Epic --
ruleset=Epic,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Epic/Epic.list

; -- Xbox --
ruleset=Xbox,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Xbox/Xbox.list

; -- PlayStation --
ruleset=PlayStation,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/PlayStation/PlayStation.list

; -- Apple（默认直连）--
ruleset=Apple,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Apple/Apple.list

; -- Microsoft（默认直连）--
ruleset=Microsoft,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Microsoft/Microsoft.list

; -- Google --
ruleset=Google,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Google/Google.list

; -- 中国直连大规则集 --
ruleset=🎯Direct,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/ChinaMax/ChinaMax.list

; -- 中国 IP 直连 --
ruleset=🎯Direct,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/cncidr.txt

; -- 兜底走代理 --
ruleset=✈️Final,[]MATCH
