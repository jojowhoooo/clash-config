[custom]

enable_rule_generator=true
overwrite_original_rules=true

clash_rule_base=https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GeneralClashConfig.yml

; ==============================
; custom_proxy_group 语法说明：
; 名称`类型`匹配节点正则`测速URL`测速间隔`容差`子组1`子组2...
; 引用子组直接写组名，引用直连写 DIRECT
; 不能用 [] 包裹组名，图标直接写在名称里
; ==============================

; ---------- 地区自动选优组（供其他组引用）----------
custom_proxy_group=HK Auto`url-test`(?i)(港|HK|Hong.?Kong)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=US Auto`url-test`(?i)(美|US|United.?States)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=JP Auto`url-test`(?i)(日|JP|Japan)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=TW Auto`url-test`(?i)(台|TW|Taiwan)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=SG Auto`url-test`(?i)(新|SG|Singapore)`http://www.gstatic.com/generate_204`300,,50

; ---------- 主代理组 ----------
custom_proxy_group=Proxies`select`.*`http://www.gstatic.com/generate_204`300,,HK Auto`US Auto`JP Auto`TW Auto`SG Auto`DIRECT

; ---------- 直连组 ----------
custom_proxy_group=🎯Direct`select`^$`http://www.gstatic.com/generate_204`300,,DIRECT`Proxies

; ---------- 流媒体 ----------
custom_proxy_group=Netflix`select`.*`http://www.gstatic.com/generate_204`300,,Proxies`HK Auto`US Auto`JP Auto`TW Auto`SG Auto`DIRECT
custom_proxy_group=HBO`select`.*`http://www.gstatic.com/generate_204`300,,Proxies`US Auto`HK Auto`DIRECT
custom_proxy_group=DisneyPlus`select`.*`http://www.gstatic.com/generate_204`300,,Proxies`HK Auto`US Auto`JP Auto`TW Auto`SG Auto`DIRECT
custom_proxy_group=YouTube`select`.*`http://www.gstatic.com/generate_204`300,,Proxies`HK Auto`US Auto`JP Auto`DIRECT
custom_proxy_group=Bahamut`select`.*`http://www.gstatic.com/generate_204`300,,Proxies`TW Auto`DIRECT
custom_proxy_group=Bilibili`select`^$`http://www.gstatic.com/generate_204`300,,DIRECT`Proxies`HK Auto`TW Auto
custom_proxy_group=MyTVSuper`select`.*`http://www.gstatic.com/generate_204`300,,Proxies`HK Auto`DIRECT

; ---------- AI ----------
custom_proxy_group=AI`select`.*`http://www.gstatic.com/generate_204`300,,Proxies`US Auto`HK Auto`JP Auto`SG Auto`DIRECT

; ---------- 社交通讯 ----------
custom_proxy_group=Telegram`select`.*`http://www.gstatic.com/generate_204`300,,Proxies`HK Auto`US Auto`SG Auto`DIRECT
custom_proxy_group=Tiktok`select`.*`http://www.gstatic.com/generate_204`300,,Proxies`US Auto`HK Auto`SG Auto`DIRECT

; ---------- 加密货币 ----------
custom_proxy_group=Crypto`select`.*`http://www.gstatic.com/generate_204`300,,Proxies`US Auto`HK Auto`SG Auto`DIRECT

; ---------- 游戏平台 ----------
custom_proxy_group=Steam`select`.*`http://www.gstatic.com/generate_204`300,,Proxies`HK Auto`US Auto`JP Auto`DIRECT
custom_proxy_group=Epic`select`.*`http://www.gstatic.com/generate_204`300,,Proxies`US Auto`HK Auto`DIRECT
custom_proxy_group=Xbox`select`.*`http://www.gstatic.com/generate_204`300,,Proxies`US Auto`HK Auto`DIRECT
custom_proxy_group=PlayStation`select`.*`http://www.gstatic.com/generate_204`300,,Proxies`HK Auto`US Auto`JP Auto`DIRECT

; ---------- 大厂 ----------
custom_proxy_group=Microsoft`select`^$`http://www.gstatic.com/generate_204`300,,DIRECT`Proxies`HK Auto`US Auto
custom_proxy_group=Apple`select`^$`http://www.gstatic.com/generate_204`300,,DIRECT`Proxies
custom_proxy_group=Google`select`.*`http://www.gstatic.com/generate_204`300,,Proxies`HK Auto`US Auto`JP Auto`DIRECT

; ---------- 学术 ----------
custom_proxy_group=Scholar`select`.*`http://www.gstatic.com/generate_204`300,,Proxies`US Auto`HK Auto`JP Auto`DIRECT

; ---------- 兜底 ----------
custom_proxy_group=✈️Final`select`.*`http://www.gstatic.com/generate_204`300,,Proxies`🎯Direct`HK Auto`US Auto`JP Auto`TW Auto`SG Auto`DIRECT

; ==============================
; ruleset
; 格式：代理组,规则文件URL  或  代理组,[]规则类型,值
; ==============================

; -- 本地/私有网段直连 --
ruleset=🎯Direct,[]DOMAIN-SUFFIX,localhost
ruleset=🎯Direct,[]DOMAIN-SUFFIX,local
ruleset=🎯Direct,[]IP-CIDR,192.168.0.0/16
ruleset=🎯Direct,[]IP-CIDR,10.0.0.0/8
ruleset=🎯Direct,[]IP-CIDR,172.16.0.0/12
ruleset=🎯Direct,[]IP-CIDR,127.0.0.0/8
ruleset=🎯Direct,[]IP-CIDR,100.64.0.0/10
ruleset=🎯Direct,[]IP-CIDR,198.18.0.0/16

; -- 订阅/DNS 域名直连 --
ruleset=🎯Direct,[]DOMAIN-SUFFIX,ping0.cc
ruleset=🎯Direct,[]DOMAIN-SUFFIX,wrecking7857.com
ruleset=🎯Direct,[]DOMAIN-SUFFIX,carrousel6917.com
ruleset=🎯Direct,[]DOMAIN-SUFFIX,simmering3378.com

; -- 微信进程直连 --
ruleset=🎯Direct,[]PROCESS-NAME,Weixin.exe

; -- AI --
ruleset=AI,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.list
ruleset=AI,[]DOMAIN-SUFFIX,anthropic.com
ruleset=AI,[]DOMAIN-SUFFIX,claude.ai
ruleset=AI,[]DOMAIN-SUFFIX,perplexity.ai
ruleset=AI,[]DOMAIN-SUFFIX,pplx.ai
ruleset=AI,[]DOMAIN-SUFFIX,x.ai
ruleset=AI,[]DOMAIN-SUFFIX,grok.com
ruleset=AI,[]DOMAIN-SUFFIX,deepmind.com

