;######################################################################
;#
;# clash_jojo_v1.3_clean.ini
;#
;# 设计逻辑：
;#
;# 1. 已知普通网站：
;#    主力优先，流量池兜底
;#
;# 2. 海外媒体 / Telegram：
;#    流量池优先，主力兜底
;#
;# 3. 漏网之鱼：
;#    流量池优先，主力兜底
;#    用于承接未收录的大流量站点
;#
;# 4. AI：
;#    默认 AI自动
;#    主力指定地区优先，流量池指定地区兜底
;#    排除香港 / 韩国
;#
;# 5. 常用要改的策略放上面
;#    不常改的规则和节点匹配放下面
;#
;######################################################################



;======================================================================
; 0、常用策略组
;======================================================================


;----------------------------------------------------------------------
; AI：默认选 AI自动；需要固定地区时切 AI手动
;----------------------------------------------------------------------

custom_proxy_group=AI服务`select`[]AI自动`[]AI手动

custom_proxy_group=AI自动`fallback`[]日本_主力`[]台湾_主力`[]新加坡_主力`[]美国_主力`[]日本_流量池`[]台湾_流量池`[]新加坡_流量池`[]美国_流量池`http://www.gstatic.com/generate_204`300,100,2000

custom_proxy_group=AI手动`select`[]日本_主力`[]台湾_主力`[]新加坡_主力`[]美国_主力`[]日本_流量池`[]台湾_流量池`[]新加坡_流量池`[]美国_流量池



;----------------------------------------------------------------------
; 海外媒体：默认流量池优先；需要换区时直接切具体地区
;----------------------------------------------------------------------

custom_proxy_group=海外媒体`select`[]大流量代理`[]日本_流量池`[]台湾_流量池`[]香港_流量池`[]韩国_流量池`[]新加坡_流量池`[]美国_流量池`[]主力策略组`[]指定地区`[]手动节点



;----------------------------------------------------------------------
; 普通代理：已知普通国外网站默认走这里
;----------------------------------------------------------------------

custom_proxy_group=普通代理`fallback`[]主力策略组`[]流量池策略组`http://www.gstatic.com/generate_204`300,100,2000



;----------------------------------------------------------------------
; 大流量代理：媒体 / Telegram / 大流量场景默认走这里
;----------------------------------------------------------------------

custom_proxy_group=大流量代理`fallback`[]流量池策略组`[]主力策略组`http://www.gstatic.com/generate_204`300,100,2000



;----------------------------------------------------------------------
; 漏网之鱼：未命中规则的流量默认走这里
;----------------------------------------------------------------------

custom_proxy_group=漏网之鱼`fallback`[]流量池策略组`[]主力策略组`http://www.gstatic.com/generate_204`300,100,2000



;----------------------------------------------------------------------
; 下载：默认直连，不行再手动切
;----------------------------------------------------------------------

custom_proxy_group=Steam下载`select`[]DIRECT`[]流量池策略组`[]主力策略组`[]手动节点



;======================================================================
; 1、业务策略组
;======================================================================


;----------------------------------------------------------------------
; 核心通讯：主力优先，流量池兜底
;----------------------------------------------------------------------

custom_proxy_group=核心通讯`select`[]普通代理`[]主力策略组`[]流量池策略组`[]指定地区`[]手动节点`[]DIRECT



;----------------------------------------------------------------------
; 加密货币 / 金融：主力优先，流量池兜底
;----------------------------------------------------------------------

custom_proxy_group=加密货币`select`[]普通代理`[]主力策略组`[]流量池策略组`[]指定地区`[]手动节点



;----------------------------------------------------------------------
; 普通海外社交：主力优先，流量池兜底
; 如果临时刷视频多，可手动切大流量代理
;----------------------------------------------------------------------

custom_proxy_group=海外社交`select`[]普通代理`[]大流量代理`[]主力策略组`[]流量池策略组`[]指定地区`[]手动节点`[]DIRECT



;----------------------------------------------------------------------
; 自定义代理：已知普通网站，主力优先，流量池兜底
;----------------------------------------------------------------------

custom_proxy_group=自定义代理`select`[]普通代理`[]主力策略组`[]流量池策略组`[]指定地区`[]手动节点`[]DIRECT



;----------------------------------------------------------------------
; Google 普通服务：主力优先，流量池兜底
; AI 相关会被前面的 AI 规则优先命中
;----------------------------------------------------------------------

custom_proxy_group=谷歌服务`select`[]普通代理`[]主力策略组`[]流量池策略组`[]指定地区`[]手动节点`[]DIRECT



;----------------------------------------------------------------------
; 开发服务：主力优先，流量池兜底
;----------------------------------------------------------------------

custom_proxy_group=开发服务`select`[]普通代理`[]主力策略组`[]流量池策略组`[]指定地区`[]手动节点`[]DIRECT



;----------------------------------------------------------------------
; Apple / Microsoft：默认直连，必要时代理
;----------------------------------------------------------------------

custom_proxy_group=苹果服务`select`[]DIRECT`[]普通代理`[]主力策略组`[]流量池策略组`[]指定地区`[]手动节点

custom_proxy_group=微软服务`select`[]DIRECT`[]普通代理`[]主力策略组`[]流量池策略组`[]指定地区`[]手动节点



;----------------------------------------------------------------------
; 游戏平台：网页 / 登录 / 商店走普通代理，下载另走 Steam下载
;----------------------------------------------------------------------

custom_proxy_group=游戏平台`select`[]普通代理`[]DIRECT`[]主力策略组`[]流量池策略组`[]指定地区`[]手动节点



;----------------------------------------------------------------------
; 国内媒体 / 国内直连
;----------------------------------------------------------------------

custom_proxy_group=国内媒体`select`[]DIRECT`[]大流量代理`[]普通代理`[]手动节点

custom_proxy_group=全球直连`select`[]DIRECT`[]普通代理`[]手动节点



;======================================================================
; 2、地区与手动入口
;======================================================================


;----------------------------------------------------------------------
; 指定地区：需要临时固定地区时使用
;----------------------------------------------------------------------

custom_proxy_group=指定地区`select`[]日本`[]台湾`[]香港`[]新加坡`[]美国`[]韩国`[]手动节点



;----------------------------------------------------------------------
; 地区聚合：默认该地区主力优先，可手动切流量池
;----------------------------------------------------------------------

custom_proxy_group=日本`select`[]日本_主力`[]日本_流量池`[]手动节点
custom_proxy_group=台湾`select`[]台湾_主力`[]台湾_流量池`[]手动节点
custom_proxy_group=香港`select`[]香港_主力`[]香港_流量池`[]手动节点
custom_proxy_group=新加坡`select`[]新加坡_主力`[]新加坡_流量池`[]手动节点
custom_proxy_group=美国`select`[]美国_主力`[]美国_流量池`[]手动节点
custom_proxy_group=韩国`select`[]韩国_主力`[]韩国_流量池`[]手动节点



;----------------------------------------------------------------------
; 手动节点：排除订阅信息类节点
;----------------------------------------------------------------------

custom_proxy_group=手动节点`select`^(?!.*(?i:Traffic|Expire|Reset|GB|Days|Left|Date|剩余|流量|到期|过期|重置|套餐|官网|订阅|公告)).*



;======================================================================
; 3、基础线路组
;======================================================================


;----------------------------------------------------------------------
; 主力策略组：普通网站 / 核心服务优先使用
;----------------------------------------------------------------------

custom_proxy_group=主力策略组`fallback`[]日本_主力`[]台湾_主力`[]香港_主力`[]新加坡_主力`[]美国_主力`http://www.gstatic.com/generate_204`300,100,2000



;----------------------------------------------------------------------
; 流量池策略组：大流量 / 未知流量优先使用
;----------------------------------------------------------------------

custom_proxy_group=流量池策略组`fallback`[]日本_流量池`[]台湾_流量池`[]香港_流量池`[]韩国_流量池`[]新加坡_流量池`[]美国_流量池`http://www.gstatic.com/generate_204`300,100,2000



;======================================================================
; 4、节点匹配
;======================================================================


;----------------------------------------------------------------------
; 主力节点匹配
;----------------------------------------------------------------------

custom_proxy_group=日本_主力`url-test`(?i)(Japan)`http://www.gstatic.com/generate_204`300,100,2000
custom_proxy_group=台湾_主力`url-test`(?i)(Taiwan)`http://www.gstatic.com/generate_204`300,100,2000
custom_proxy_group=香港_主力`url-test`(?i)(Hong Kong)`http://www.gstatic.com/generate_204`300,100,2000
custom_proxy_group=新加坡_主力`url-test`(?i)(Singapore)`http://www.gstatic.com/generate_204`300,100,2000
custom_proxy_group=美国_主力`url-test`(?i)(United States)`http://www.gstatic.com/generate_204`300,100,2000
custom_proxy_group=韩国_主力`url-test`(?i)(South Korea)`http://www.gstatic.com/generate_204`300,100,2000



;----------------------------------------------------------------------
; 流量池节点匹配
;----------------------------------------------------------------------

custom_proxy_group=日本_流量池`url-test`(?i)(日本高速|日本专线|日本.*流媒体)`http://www.gstatic.com/generate_204`300,100,2000
custom_proxy_group=台湾_流量池`url-test`(?i)(台湾高速|台湾专线|台湾.*流媒体)`http://www.gstatic.com/generate_204`300,100,2000
custom_proxy_group=香港_流量池`url-test`(?i)(香港高速|香港专线|香港.*流媒体)`http://www.gstatic.com/generate_204`300,100,2000
custom_proxy_group=新加坡_流量池`url-test`(?i)(新加坡高速|新加坡专线|新加坡.*流媒体)`http://www.gstatic.com/generate_204`300,100,2000
custom_proxy_group=美国_流量池`url-test`(?i)(美国高速|美国专线|美国.*流媒体|美国\d+.*流媒体)`http://www.gstatic.com/generate_204`300,100,2000
custom_proxy_group=韩国_流量池`url-test`(?i)(韩国高速|韩国专线|韩国.*流媒体)`http://www.gstatic.com/generate_204`300,100,2000



;======================================================================
; 5、规则集
;======================================================================


;----------------------------------------------------------------------
; 5.1 局域网 / 内网直连
;----------------------------------------------------------------------

ruleset=DIRECT,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Lan/Lan.list



;----------------------------------------------------------------------
; 5.2 自定义代理
;----------------------------------------------------------------------

ruleset=自定义代理,https://fastly.jsdelivr.net/gh/jojowhoooo/clash-config@main/rule/custom-proxy.list



;----------------------------------------------------------------------
; 5.3 AI 服务
;----------------------------------------------------------------------

ruleset=AI服务,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/OpenAI/OpenAI.list
ruleset=AI服务,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Copilot/Copilot.list
ruleset=AI服务,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Gemini/Gemini.list
ruleset=AI服务,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Claude/Claude.list



;----------------------------------------------------------------------
