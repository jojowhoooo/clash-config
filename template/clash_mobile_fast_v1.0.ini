;######################################################################
;#
;# clash_mobile_fast_v1.0.ini
;#
;# 设计逻辑：
;#
;# 1. 手机端优先减少启动等待
;#    顶层策略尽量使用 select，避免启动时多层 fallback 测速
;#
;# 2. 主力 / 流量池仍保留自动测速
;#    但只在基础线路组做 url-test，不在每个业务组重复测速
;#
;# 3. AI 默认只走主力
;#    避免自动混入良心云流量池，降低风控和 IP 频繁变化
;#
;# 4. 流媒体 / Telegram / 漏网之鱼
;#    默认走流量池，主力兜底
;#
;######################################################################

;======================================================================
; 0、常用策略组
;======================================================================

;----------------------------------------------------------------------
; AI：默认只走主力，不自动混入流量池
;----------------------------------------------------------------------

custom_proxy_group=AI服务`select`[]AI自动`[]AI手动`[]手动节点

custom_proxy_group=AI自动`select`[]日本_主力`[]新加坡_主力`[]美国_主力`[]台湾_主力

custom_proxy_group=AI手动`select`[]日本_主力`[]新加坡_主力`[]美国_主力`[]台湾_主力`[]香港_主力`[]日本_流量池`[]新加坡_流量池`[]美国_流量池`[]台湾_流量池

;----------------------------------------------------------------------
; 海外媒体：默认流量池优先；需要换区时直接切具体地区
;----------------------------------------------------------------------

custom_proxy_group=海外媒体`select`[]大流量代理`[]日本_流量池`[]台湾_流量池`[]香港_流量池`[]韩国_流量池`[]新加坡_流量池`[]美国_流量池`[]主力策略组`[]指定地区`[]手动节点

;----------------------------------------------------------------------
; 普通代理：已知普通国外网站，默认主力，流量池兜底
; 顶层使用 select，减少手机端启动测速
;----------------------------------------------------------------------

custom_proxy_group=普通代理`select`[]主力策略组`[]流量池策略组`[]手动节点

;----------------------------------------------------------------------
; 大流量代理：媒体 / Telegram / 大流量场景默认走这里
; 顶层使用 select，测速交给流量池策略组
;----------------------------------------------------------------------

custom_proxy_group=大流量代理`select`[]流量池策略组`[]主力策略组`[]手动节点

;----------------------------------------------------------------------
; 漏网之鱼：未命中规则的流量默认走这里
; 手机端不建议 fallback，避免启动时额外判断
;----------------------------------------------------------------------

custom_proxy_group=漏网之鱼`select`[]流量池策略组`[]主力策略组`[]DIRECT`[]手动节点

;----------------------------------------------------------------------
; 下载：默认直连，不行再手动切
;----------------------------------------------------------------------

custom_proxy_group=Steam下载`select`[]DIRECT`[]流量池策略组`[]主力策略组`[]手动节点

;======================================================================
; 1、业务策略组
;======================================================================

;----------------------------------------------------------------------
; 核心通讯：默认主力
;----------------------------------------------------------------------

custom_proxy_group=核心通讯`select`[]普通代理`[]主力策略组`[]流量池策略组`[]指定地区`[]手动节点`[]DIRECT

;----------------------------------------------------------------------
; 加密货币 / 金融：默认只走主力，避免流量池 IP 风控
;----------------------------------------------------------------------

custom_proxy_group=加密货币`select`[]主力策略组`[]日本_主力`[]新加坡_主力`[]美国_主力`[]台湾_主力`[]香港_主力`[]手动节点

;----------------------------------------------------------------------
; 普通海外社交：默认主力；刷视频多可手动切大流量代理
;----------------------------------------------------------------------

custom_proxy_group=海外社交`select`[]普通代理`[]大流量代理`[]主力策略组`[]流量池策略组`[]指定地区`[]手动节点`[]DIRECT

;----------------------------------------------------------------------
; 自定义代理：已知普通网站，默认主力
;----------------------------------------------------------------------

custom_proxy_group=自定义代理`select`[]普通代理`[]主力策略组`[]流量池策略组`[]指定地区`[]手动节点`[]DIRECT

;----------------------------------------------------------------------
; Google 普通服务：默认主力
; AI 相关会被前面的 AI 规则优先命中
;----------------------------------------------------------------------

custom_proxy_group=谷歌服务`select`[]普通代理`[]主力策略组`[]流量池策略组`[]指定地区`[]手动节点`[]DIRECT

;----------------------------------------------------------------------
; 开发服务：默认主力
;----------------------------------------------------------------------

custom_proxy_group=开发服务`select`[]普通代理`[]主力策略组`[]流量池策略组`[]指定地区`[]手动节点`[]DIRECT

;----------------------------------------------------------------------
; Apple / Microsoft：默认直连，必要时代理
;----------------------------------------------------------------------

custom_proxy_group=苹果服务`select`[]DIRECT`[]普通代理`[]主力策略组`[]流量池策略组`[]指定地区`[]手动节点

custom_proxy_group=微软服务`select`[]DIRECT`[]普通代理`[]主力策略组`[]流量池策略组`[]指定地区`[]手动节点

;----------------------------------------------------------------------
; 游戏平台：网页 / 登录 / 商店走普通代理，下载另走 Steam下载
;----------------------------------------------------------------------

custom_proxy_group=游戏平台`select`[]普通代理`[]DIRECT`[]主力策略组`[]流量池策略组`[]指定地区`[]手动节点

;----------------------------------------------------------------------
; 国内媒体 / 国内直连
;----------------------------------------------------------------------

custom_proxy_group=国内媒体`select`[]DIRECT`[]大流量代理`[]普通代理`[]手动节点

custom_proxy_group=全球直连`select`[]DIRECT`[]普通代理`[]手动节点

;======================================================================
; 2、地区与手动入口
;======================================================================

;----------------------------------------------------------------------
; 指定地区：需要临时固定地区时使用
;----------------------------------------------------------------------

custom_proxy_group=指定地区`select`[]日本`[]台湾`[]香港`[]新加坡`[]美国`[]韩国`[]手动节点

;----------------------------------------------------------------------
; 地区聚合：默认该地区主力优先，可手动切流量池
; 这里用 select，不做额外 fallback
;----------------------------------------------------------------------

custom_proxy_group=日本`select`[]日本_主力`[]日本_流量池`[]手动节点
custom_proxy_group=台湾`select`[]台湾_主力`[]台湾_流量池`[]手动节点
custom_proxy_group=香港`select`[]香港_主力`[]香港_流量池`[]手动节点
custom_proxy_group=新加坡`select`[]新加坡_主力`[]新加坡_流量池`[]手动节点
custom_proxy_group=美国`select`[]美国_主力`[]美国_流量池`[]手动节点
custom_proxy_group=韩国`select`[]韩国_主力`[]韩国_流量池`[]手动节点

;----------------------------------------------------------------------
; 手动节点：排除订阅信息类节点
;----------------------------------------------------------------------

custom_proxy_group=手动节点`select`^(?!.*(?i:Traffic|Expire|Reset|GB|Days|Left|Date|剩余|流量|到期|过期|重置|套餐|官网|订阅|公告)).*

;======================================================================
; 3、基础线路组
;======================================================================

;----------------------------------------------------------------------
; 主力策略组：普通网站 / 核心服务优先使用
; 保留 url-test，但合并为一个组，减少多层测速
;----------------------------------------------------------------------

custom_proxy_group=主力策略组`url-test`(?i)(Japan|Taiwan|Hong Kong|Singapore|United States)`http://www.gstatic.com/generate_204`600,100,1500

;----------------------------------------------------------------------
; 流量池策略组：大流量 / 未知流量优先使用
; 保留 url-test，但合并为一个组，减少多层测速
;----------------------------------------------------------------------

custom_proxy_group=流量池策略组`url-test`(?i)(日本高速|日本专线|日本.*流媒体|台湾高速|台湾专线|台湾.*流媒体|香港高速|香港专线|香港.*流媒体|韩国高速|韩国专线|韩国.*流媒体|新加坡高速|新加坡专线|新加坡.*流媒体|美国高速|美国专线|美国.*流媒体|美国\d+.*流媒体)`http://www.gstatic.com/generate_204`600,100,1500

;======================================================================
; 4、节点匹配
;======================================================================

;----------------------------------------------------------------------
; 主力节点匹配
;----------------------------------------------------------------------

custom_proxy_group=日本_主力`url-test`(?i)(Japan)`http://www.gstatic.com/generate_204`600,100,1500
custom_proxy_group=台湾_主力`url-test`(?i)(Taiwan)`http://www.gstatic.com/generate_204`600,100,1500
custom_proxy_group=香港_主力`url-test`(?i)(Hong Kong)`http://www.gstatic.com/generate_204`600,100,1500
custom_proxy_group=新加坡_主力`url-test`(?i)(Singapore)`http://www.gstatic.com/generate_204`600,100,1500
custom_proxy_group=美国_主力`url-test`(?i)(United States)`http://www.gstatic.com/generate_204`600,100,1500
custom_proxy_group=韩国_主力`url-test`(?i)(South Korea)`http://www.gstatic.com/generate_204`600,100,1500

;----------------------------------------------------------------------
; 流量池节点匹配
;----------------------------------------------------------------------

custom_proxy_group=日本_流量池`url-test`(?i)(日本高速|日本专线|日本.*流媒体)`http://www.gstatic.com/generate_204`600,100,1500
custom_proxy_group=台湾_流量池`url-test`(?i)(台湾高速|台湾专线|台湾.*流媒体)`http://www.gstatic.com/generate_204`600,100,1500
custom_proxy_group=香港_流量池`url-test`(?i)(香港高速|香港专线|香港.*流媒体)`http://www.gstatic.com/generate_204`600,100,1500
custom_proxy_group=新加坡_流量池`url-test`(?i)(新加坡高速|新加坡专线|新加坡.*流媒体)`http://www.gstatic.com/generate_204`600,100,1500
custom_proxy_group=美国_流量池`url-test`(?i)(美国高速|美国专线|美国.*流媒体|美国\d+.*流媒体)`http://www.gstatic.com/generate_204`600,100,1500
custom_proxy_group=韩国_流量池`url-test`(?i)(韩国高速|韩国专线|韩国.*流媒体)`http://www.gstatic.com/generate_204`600,100,1500

;======================================================================
; 5、规则集
;======================================================================
