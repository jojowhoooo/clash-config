;######################################################################
;#
;# clash_jojo_v1.2_clean.ini
;#
;# 设计逻辑：
;#
;# 1. 主力：
;#    - AI
;#    - 核心通讯
;#    - 金融 / 加密货币
;#    - 普通国外网站
;#    - Google / GitHub / 海外社交
;#
;# 2. 流量池：
;#    - 海外媒体
;#    - Telegram
;#    - 未知大流量站点
;#    - 漏网之鱼
;#
;# 3. 双线路互补：
;#    - 普通代理：主力优先，流量池兜底
;#    - 大流量代理：流量池优先，主力兜底
;#    - AI：主力指定地区优先，流量池指定地区兜底
;#
;# 4. AI 特殊处理：
;#    - 不默认走香港
;#    - 不默认走韩国
;#    - 不默认走全量流量池
;#    - 只用日本 / 台湾 / 新加坡 / 美国
;#
;######################################################################


;======================================================================
; 1、规则集
;======================================================================


;----------------------------------------------------------------------
; 1.1 局域网 / 内网直连
;----------------------------------------------------------------------

ruleset=DIRECT,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Lan/Lan.list


;----------------------------------------------------------------------
; 1.2 自定义代理
; 已知普通网站默认走主力，流量池兜底。
;----------------------------------------------------------------------

ruleset=自定义代理,https://fastly.jsdelivr.net/gh/jojowhoooo/clash-config@main/rule/custom-proxy.list


;----------------------------------------------------------------------
; 1.3 AI 服务
; 主力指定地区优先，流量池指定地区兜底。
; 不默认走香港，不默认走韩国。
;----------------------------------------------------------------------

ruleset=AI服务,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/OpenAI/OpenAI.list
ruleset=AI服务,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Copilot/Copilot.list
ruleset=AI服务,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Gemini/Gemini.list
ruleset=AI服务,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Claude/Claude.list


;----------------------------------------------------------------------
; 1.4 核心通讯
; 默认走主力，流量池兜底。
;----------------------------------------------------------------------

ruleset=核心通讯,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Line/Line.list
ruleset=核心通讯,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Whatsapp/Whatsapp.list
ruleset=核心通讯,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Discord/Discord.list


;----------------------------------------------------------------------
; 1.5 加密货币 / 金融
; 默认走主力，流量池兜底。
;----------------------------------------------------------------------

ruleset=加密货币,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Crypto/Crypto.list


;----------------------------------------------------------------------
; 1.6 普通海外社交
; 默认走主力，流量池兜底。
; Telegram 不在这里，归入海外媒体。
;----------------------------------------------------------------------

ruleset=海外社交,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Twitter/Twitter.list
ruleset=海外社交,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Facebook/Facebook.list
ruleset=海外社交,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Instagram/Instagram.list
ruleset=海外社交,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Reddit/Reddit.list


;----------------------------------------------------------------------
; 1.7 海外媒体 / 大流量
; 默认走流量池，主力兜底。
;----------------------------------------------------------------------

ruleset=海外媒体,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Telegram/Telegram.list
ruleset=海外媒体,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/YouTube/YouTube.list
ruleset=海外媒体,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/YouTubeMusic/YouTubeMusic.list
ruleset=海外媒体,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Netflix/Netflix.list
ruleset=海外媒体,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Disney/Disney.list
ruleset=海外媒体,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/HBO/HBO.list
ruleset=海外媒体,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/AmazonPrimeVideo/AmazonPrimeVideo.list
ruleset=海外媒体,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Hulu/Hulu.list
ruleset=海外媒体,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Spotify/Spotify.list
ruleset=海外媒体,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/TikTok/TikTok.list
ruleset=海外媒体,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Twitch/Twitch.list
ruleset=海外媒体,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Bahamut/Bahamut.list
ruleset=海外媒体,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/AbemaTV/AbemaTV.list
ruleset=海外媒体,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Niconico/Niconico.list


;----------------------------------------------------------------------
; 1.8 大厂服务
; Google 默认主力，流量池兜底。
; Apple / Microsoft 默认直连，必要时代理。
; Gemini 会被前面的 AI 规则优先命中。
;----------------------------------------------------------------------

ruleset=苹果服务,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Apple/Apple.list
ruleset=微软服务,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Microsoft/Microsoft.list
ruleset=谷歌服务,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Google/Google.list


;----------------------------------------------------------------------
; 1.9 开发服务
; 默认走主力，流量池兜底。
;----------------------------------------------------------------------

ruleset=开发服务,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/GitHub/GitHub.list


;----------------------------------------------------------------------
; 1.10 游戏平台 / 下载
; 下载默认 DIRECT。
; 如果 CDN 不稳，再手动切流量池或主力。
;----------------------------------------------------------------------

ruleset=Steam下载,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/SteamCN/SteamCN.list
ruleset=Steam下载,[]DOMAIN-SUFFIX,steamcontent.com
ruleset=Steam下载,[]DOMAIN-SUFFIX,steamserver.net
ruleset=Steam下载,[]DOMAIN-SUFFIX,steamcdn-a.akamaihd.net
ruleset=Steam下载,[]DOMAIN-SUFFIX,steampipe.akamaized.net
ruleset=Steam下载,[]DOMAIN-SUFFIX,steampipe-kr.akamaized.net
ruleset=Steam下载,[]DOMAIN-SUFFIX,steampipe-partner.akamaized.net

ruleset=游戏平台,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Steam/Steam.list
ruleset=游戏平台,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Epic/Epic.list
ruleset=游戏平台,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/EA/EA.list
ruleset=游戏平台,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Blizzard/Blizzard.list
ruleset=游戏平台,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/UBI/UBI.list
ruleset=游戏平台,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Sony/Sony.list
ruleset=游戏平台,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Nintendo/Nintendo.list


;----------------------------------------------------------------------
; 1.11 国内媒体
;----------------------------------------------------------------------

ruleset=国内媒体,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/ChinaMedia/ChinaMedia.list


;----------------------------------------------------------------------
; 1.12 中国大陆直连
;----------------------------------------------------------------------

ruleset=全球直连,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/China/China.list
ruleset=全球直连,[]GEOIP,CN


;----------------------------------------------------------------------
; 1.13 兜底
; 未命中任何规则的流量默认进「漏网之鱼」。
; 漏网之鱼默认流量池，主力兜底。
;----------------------------------------------------------------------

ruleset=漏网之鱼,[]FINAL



;======================================================================
; 2、策略组
;======================================================================


;----------------------------------------------------------------------
; 2.1 总入口 / 手动节点
;----------------------------------------------------------------------

custom_proxy_group=指定地区`select`[]日本`[]台湾`[]香港`[]新加坡`[]美国`[]韩国`[]手动节点

custom_proxy_group=手动节点`select`^(?!.*(?i:Traffic|Expire|Reset|GB|Days|Left|Date|剩余|流量|到期|过期|重置|套餐|官网|订阅|公告)).*



;----------------------------------------------------------------------
; 2.2 业务策略组
;----------------------------------------------------------------------

; AI：主力指定地区优先，流量池指定地区兜底
; 不默认走香港 / 韩国
custom_proxy_group=AI服务`select`[]AI代理`[]AI主力`[]AI兜底`[]日本_主力`[]台湾_主力`[]新加坡_主力`[]美国_主力`[]日本_流量池`[]台湾_流量池`[]新加坡_流量池`[]美国_流量池`[]手动节点

; 核心通讯：主力优先，流量池兜底
custom_proxy_group=核心通讯`select`[]普通代理`[]主力策略组`[]流量池策略组`[]指定地区`[]手动节点`[]DIRECT

; 加密货币 / 金融：主力优先，流量池兜底
custom_proxy_group=加密货币`select`[]普通代理`[]主力策略组`[]流量池策略组`[]指定地区`[]手动节点

; 普通海外社交：主力优先，流量池兜底
custom_proxy_group=海外社交`select`[]普通代理`[]主力策略组`[]流量池策略组`[]指定地区`[]手动节点`[]DIRECT

; 自定义代理：已知普通网站，主力优先，流量池兜底
custom_proxy_group=自定义代理`select`[]普通代理`[]主力策略组`[]流量池策略组`[]指定地区`[]手动节点`[]DIRECT

; Google 普通服务：主力优先，流量池兜底
; Gemini 会被 AI 服务优先命中
custom_proxy_group=谷歌服务`select`[]普通代理`[]主力策略组`[]流量池策略组`[]指定地区`[]手动节点`[]DIRECT

; GitHub / 开发服务：主力优先，流量池兜底
custom_proxy_group=开发服务`select`[]普通代理`[]主力策略组`[]流量池策略组`[]指定地区`[]手动节点`[]DIRECT

; 海外媒体：流量池优先，主力兜底
custom_proxy_group=海外媒体`select`[]大流量代理`[]流量池策略组`[]日本_流量池`[]台湾_流量池`[]香港_流量池`[]韩国_流量池`[]新加坡_流量池`[]美国_流量池`[]主力策略组`[]指定地区`[]手动节点

; 苹果服务：默认直连，必要时代理
custom_proxy_group=苹果服务`select`[]DIRECT`[]普通代理`[]主力策略组`[]流量池策略组`[]指定地区`[]手动节点

; 微软服务：默认直连，必要时代理
custom_proxy_group=微软服务`select`[]DIRECT`[]普通代理`[]主力策略组`[]流量池策略组`[]指定地区`[]手动节点

; 下载：默认直连，不行再手动切流量池或主力
custom_proxy_group=Steam下载`select`[]DIRECT`[]流量池策略组`[]主力策略组`[]手动节点

; 游戏平台网页 / 登录 / 商店：主力优先，流量池兜底，下载另走下载策略
custom_proxy_group=游戏平台`select`[]普通代理`[]DIRECT`[]主力策略组`[]流量池策略组`[]指定地区`[]手动节点

; 国内媒体默认直连
custom_proxy_group=国内媒体`select`[]DIRECT`[]大流量代理`[]普通代理`[]手动节点

; 中国大陆 / 局域网直连
custom_proxy_group=全球直连`select`[]DIRECT`[]普通代理`[]手动节点

; 漏网之鱼：未知流量默认流量池，主力兜底
custom_proxy_group=漏网之鱼`fallback`[]大流量代理`[]流量池策略组`[]主力策略组`http://www.gstatic.com/generate_204`300,100,2000



;----------------------------------------------------------------------
; 2.3 通用互补组
;----------------------------------------------------------------------

; 普通代理：主力优先，流量池兜底
custom_proxy_group=普通代理`fallback`[]主力策略组`[]流量池策略组`http://www.gstatic.com/generate_204`300,100,2000

; 大流量代理：流量池优先，主力兜底
custom_proxy_group=大流量代理`fallback`[]流量池策略组`[]主力策略组`http://www.gstatic.com/generate_204`300,100,2000

; 流媒体策略：用于手动换地区
custom_proxy_group=流媒体策略`select`[]大流量代理`[]流量池策略组`[]日本_流量池`[]台湾_流量池`[]香港_流量池`[]韩国_流量池`[]新加坡_流量池`[]美国_流量池`[]主力策略组`[]手动节点



;----------------------------------------------------------------------
; 2.4 AI 专用互补组
;----------------------------------------------------------------------

; AI 主力：排除香港 / 韩国
custom_proxy_group=AI主力`fallback`[]日本_主力`[]台湾_主力`[]新加坡_主力`[]美国_主力`http://www.gstatic.com/generate_204`300,100,2000

; AI 兜底：只使用指定地区，排除香港 / 韩国
custom_proxy_group=AI兜底`fallback`[]日本_流量池`[]台湾_流量池`[]新加坡_流量池`[]美国_流量池`http://www.gstatic.com/generate_204`300,100,2000

; AI 代理：AI 主力优先，AI 兜底备用
custom_proxy_group=AI代理`fallback`[]AI主力`[]AI兜底`http://www.gstatic.com/generate_204`300,100,2000



;======================================================================
; 3、地区组
;======================================================================


;----------------------------------------------------------------------
; 3.1 地区聚合
; 手动需要指定地区时使用。
;----------------------------------------------------------------------

custom_proxy_group=香港`select`[]香港_主力`[]香港_流量池`[]手动节点
custom_proxy_group=台湾`select`[]台湾_主力`[]台湾_流量池`[]手动节点
custom_proxy_group=日本`select`[]日本_主力`[]日本_流量池`[]手动节点
custom_proxy_group=韩国`select`[]韩国_主力`[]韩国_流量池`[]手动节点
custom_proxy_group=新加坡`select`[]新加坡_主力`[]新加坡_流量池`[]手动节点
custom_proxy_group=美国`select`[]美国_主力`[]美国_流量池`[]手动节点



;----------------------------------------------------------------------
; 3.2 主力总组
; 普通网站 / 核心服务优先使用。
;----------------------------------------------------------------------

custom_proxy_group=主力策略组`fallback`[]日本_主力`[]台湾_主力`[]香港_主力`[]新加坡_主力`[]美国_主力`http://www.gstatic.com/generate_204`300,100,2000



;----------------------------------------------------------------------
; 3.3 流量池总组
; 大流量 / 未知流量优先使用。
;----------------------------------------------------------------------

custom_proxy_group=流量池策略组`fallback`[]日本_流量池`[]台湾_流量池`[]香港_流量池`[]韩国_流量池`[]新加坡_流量池`[]美国_流量池`http://www.gstatic.com/generate_204`300,100,2000



;======================================================================
; 4、节点匹配
;======================================================================


;----------------------------------------------------------------------
; 4.1 主力节点
;----------------------------------------------------------------------

custom_proxy_group=香港_主力`url-test`(?i)(Hong Kong)`http://www.gstatic.com/generate_204`300,100,2000
custom_proxy_group=台湾_主力`url-test`(?i)(Taiwan)`http://www.gstatic.com/generate_204`300,100,2000
custom_proxy_group=日本_主力`url-test`(?i)(Japan)`http://www.gstatic.com/generate_204`300,100,2000
custom_proxy_group=韩国_主力`url-test`(?i)(South Korea)`http://www.gstatic.com/generate_204`300,100,2000
custom_proxy_group=新加坡_主力`url-test`(?i)(Singapore)`http://www.gstatic.com/generate_204`300,100,2000
custom_proxy_group=美国_主力`url-test`(?i)(United States)`http://www.gstatic.com/generate_204`300,100,2000



;----------------------------------------------------------------------
; 4.2 流量池节点
;----------------------------------------------------------------------

custom_proxy_group=香港_流量池`url-test`(?i)(香港高速|香港专线|香港.*流媒体)`http://www.gstatic.com/generate_204`300,100,2000
custom_proxy_group=台湾_流量池`url-test`(?i)(台湾高速|台湾专线|台湾.*流媒体)`http://www.gstatic.com/generate_204`300,100,2000
custom_proxy_group=日本_流量池`url-test`(?i)(日本高速|日本专线|日本.*流媒体)`http://www.gstatic.com/generate_204`300,100,2000
custom_proxy_group=韩国_流量池`url-test`(?i)(韩国高速|韩国专线|韩国.*流媒体)`http://www.gstatic.com/generate_204`300,100,2000
custom_proxy_group=新加坡_流量池`url-test`(?i)(新加坡高速|新加坡专线|新加坡.*流媒体)`http://www.gstatic.com/generate_204`300,100,2000
custom_proxy_group=美国_流量池`url-test`(?i)(美国高速|美国专线|美国.*流媒体|美国\d+.*流媒体)`http://www.gstatic.com/generate_204`300,100,2000



;======================================================================
; 5、规则生成
;======================================================================

enable_rule_generator=true
overwrite_original_rules=true